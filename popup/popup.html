<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadMate / 读伴 — __MSG_appDesc__</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1>__MSG_appName__</h1>

    <!-- TTS Engine -->
    <section>
      <h2>__MSG_ttsEngineSection__</h2>
      <div class="field">
        <label>__MSG_engineLabel__</label>
        <select id="ttsEngine">
          <option value="web-speech">__MSG_engineWebSpeech__</option>
          <option value="edge-tts">__MSG_engineEdgeTts__</option>
          <option value="custom">__MSG_engineCustom__</option>
        </select>
      </div>
      <div class="field">
        <label>__MSG_speedLabel__</label>
        <input type="range" id="ttsSpeed" min="0.3" max="2.0" step="0.1" value="1.0">
        <span id="ttsSpeedLabel">1.0x</span>
      </div>
      <div class="field" id="voiceField">
        <label>__MSG_voiceLabel__</label>
        <select id="ttsVoice"></select>
      </div>
    </section>

    <!-- Edge TTS Config -->
    <section id="edgeTtsSection" style="display:none">
      <h2>__MSG_edgeTtsSection__</h2>
      <div class="field">
        <label>__MSG_endpointLabel__</label>
        <input type="text" id="edgeTtsEndpoint" placeholder="http://192.168.199.159:5001">
      </div>
      <div class="field">
        <label>__MSG_edgeTtsVoiceLabel__</label>
        <select id="edgeTtsVoice"></select>
      </div>
    </section>

    <!-- Custom TTS -->
    <section id="customTtsSection" style="display:none">
      <h2>__MSG_customTtsSection__</h2>
      <div class="field">
        <label>__MSG_endpointLabel__</label>
        <input type="text" id="customTtsEndpoint" placeholder="http://192.168.199.159:8880/v1">
      </div>
      <div class="field">
        <label>__MSG_apiKeyLabel__</label>
        <input type="password" id="customTtsApiKey" placeholder="sk-...">
      </div>
      <div class="field">
        <label>__MSG_modelLabel__</label>
        <input type="text" id="customTtsModel" placeholder="kokoro">
      </div>
      <div class="field">
        <label>__MSG_customTtsVoiceLabel__</label>
        <input type="text" id="customTtsVoice" placeholder="af_bella">
      </div>
    </section>

    <!-- AI Translation -->
    <section>
      <h2>__MSG_aiTranslateSection__</h2>
      <div class="field">
        <label>__MSG_endpointLabel__</label>
        <input type="text" id="aiEndpoint" placeholder="https://api.deepseek.com/v1">
      </div>
      <div class="field">
        <label>__MSG_apiKeyLabel__</label>
        <input type="password" id="aiApiKey" placeholder="sk-...">
      </div>
      <div class="field">
        <label>__MSG_modelLabel__</label>
        <input type="text" id="aiModel" placeholder="deepseek-chat">
      </div>
      <div class="field">
        <label>__MSG_targetLanguageLabel__</label>
        <select id="translateTarget">
          <option value="Simplified Chinese">__MSG_langZhCn__</option>
          <option value="English">__MSG_langEn__</option>
          <option value="Japanese">__MSG_langJa__</option>
          <option value="Korean">__MSG_langKo__</option>
          <option value="French">__MSG_langFr__</option>
          <option value="German">__MSG_langDe__</option>
          <option value="Spanish">__MSG_langEs__</option>
        </select>
      </div>
      <div class="field checkbox">
        <label>
          <input type="checkbox" id="autoTranslate">
          __MSG_autoTranslateLabel__
        </label>
      </div>
    </section>

    <!-- Other Settings + UI Language -->
    <section>
      <h2>__MSG_otherSection__</h2>
      <div class="field checkbox">
        <label>
          <input type="checkbox" id="highlightEnabled" checked>
          __MSG_highlightLabel__
        </label>
      </div>
      <div class="field">
        <label>__MSG_uiLanguageLabel__</label>
        <select id="uiLanguage">
          <option value="auto">__MSG_langAuto__</option>
          <option value="en">__MSG_langEnglish__</option>
          <option value="zh_CN">__MSG_langChinese__</option>
        </select>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn">__MSG_saveButton__</button>
      <button id="testBtn">__MSG_testTranslateBtn__</button>
      <span id="saveStatus"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
