<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadMate / 读伴 — 设置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1>ReadMate 读伴</h1>

    <!-- TTS 引擎 -->
    <section>
      <h2>🗣️ 朗读引擎</h2>
      <div class="field">
        <label>引擎</label>
        <select id="ttsEngine">
          <option value="web-speech">浏览器原生语音 (Web Speech)</option>
          <option value="edge-tts">Edge TTS (本地服务器)</option>
          <option value="custom">自定义 TTS (OpenAI 兼容)</option>
        </select>
      </div>
      <div class="field">
        <label>语速</label>
        <input type="range" id="ttsSpeed" min="0.3" max="2.0" step="0.1" value="1.0">
        <span id="ttsSpeedLabel">1.0x</span>
      </div>
      <div class="field" id="voiceField">
        <label>语音</label>
        <select id="ttsVoice">
          <option value="">自动检测</option>
        </select>
      </div>
    </section>

    <!-- Edge TTS 配置 -->
    <section id="edgeTtsSection" style="display:none">
      <h2>🔧 Edge TTS 配置</h2>
      <div class="field">
        <label>端点</label>
        <input type="text" id="edgeTtsEndpoint" placeholder="http://192.168.199.159:5001">
      </div>
      <div class="field">
        <label>语音</label>
        <select id="edgeTtsVoice">
          <option value="">加载中...</option>
        </select>
      </div>
    </section>

    <!-- 自定义 TTS -->
    <section id="customTtsSection" style="display:none">
      <h2>🔧 自定义 TTS 配置</h2>
      <div class="field">
        <label>端点</label>
        <input type="text" id="customTtsEndpoint" placeholder="http://192.168.199.159:8880/v1">
      </div>
      <div class="field">
        <label>API Key</label>
        <input type="password" id="customTtsApiKey" placeholder="dummy">
      </div>
      <div class="field">
        <label>模型</label>
        <input type="text" id="customTtsModel" placeholder="kokoro">
      </div>
      <div class="field">
        <label>语音</label>
        <input type="text" id="customTtsVoice" placeholder="af_bella">
      </div>
    </section>

    <!-- AI 翻译 -->
    <section>
      <h2>🌐 AI 翻译</h2>
      <div class="field">
        <label>端点</label>
        <input type="text" id="aiEndpoint" placeholder="https://api.deepseek.com/v1">
      </div>
      <div class="field">
        <label>API Key</label>
        <input type="password" id="aiApiKey" placeholder="sk-...">
      </div>
      <div class="field">
        <label>模型</label>
        <input type="text" id="aiModel" placeholder="deepseek-chat">
      </div>
      <div class="field">
        <label>目标语言</label>
        <select id="translateTarget">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
        </select>
      </div>
      <div class="field checkbox">
        <label>
          <input type="checkbox" id="autoTranslate">
          朗读时自动翻译每个句子
        </label>
      </div>
    </section>

    <!-- 其他设置 -->
    <section>
      <h2>⚙️ 其他</h2>
      <div class="field checkbox">
        <label>
          <input type="checkbox" id="highlightEnabled" checked>
          朗读时高亮当前句子
        </label>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn">💾 保存设置</button>
      <button id="testBtn" style="margin-left:8px;padding:6px 12px;border:1px solid #888;border-radius:6px;background:none;color:#888;font-size:12px;cursor:pointer">🔄 测试翻译</button>
      <span id="saveStatus"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
