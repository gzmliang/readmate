<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle"></title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1 id="lblAppName"></h1>

    <!-- TTS Engine -->
    <section>
      <h2 id="lblTtsEngineSection"></h2>
      <div class="field">
        <label id="lblEngine"></label>
        <select id="ttsEngine">
          <option value="web-speech" id="optEngineWebSpeech"></option>
          <option value="edge-tts" id="optEngineEdgeTts"></option>
          <option value="custom" id="optEngineCustom"></option>
        </select>
      </div>
      <div class="field">
        <label id="lblSpeed"></label>
        <input type="range" id="ttsSpeed" min="0.3" max="2.0" step="0.1" value="1.0">
        <span id="ttsSpeedLabel">1.0x</span>
      </div>
      <div class="field" id="voiceField">
        <label id="lblVoice"></label>
        <select id="ttsVoice"></select>
      </div>
    </section>

    <!-- Edge TTS Config -->
    <section id="edgeTtsSection" style="display:none">
      <h2 id="lblEdgeTtsSection"></h2>
      <div class="field">
        <label id="lblEndpoint"></label>
        <input type="text" id="edgeTtsEndpoint" placeholder="http://192.168.199.159:5001">
      </div>
      <div class="field">
        <label id="lblEdgeTtsVoice"></label>
        <select id="edgeTtsVoice"></select>
      </div>
    </section>

    <!-- Custom TTS -->
    <section id="customTtsSection" style="display:none">
      <h2 id="lblCustomTtsSection"></h2>
      <div class="field">
        <label id="lblEndpoint"></label>
        <input type="text" id="customTtsEndpoint" placeholder="http://192.168.199.159:8880/v1">
      </div>
      <div class="field">
        <label id="lblApiKey"></label>
        <input type="password" id="customTtsApiKey" placeholder="sk-...">
      </div>
      <div class="field">
        <label id="lblModel"></label>
        <input type="text" id="customTtsModel" placeholder="kokoro">
      </div>
      <div class="field">
        <label id="lblCustomTtsVoice"></label>
        <input type="text" id="customTtsVoice" placeholder="af_bella">
      </div>
    </section>

    <!-- AI Translation -->
    <section>
      <h2 id="lblAiTranslateSection"></h2>
      <div class="field">
        <label id="lblEndpoint"></label>
        <input type="text" id="aiEndpoint" placeholder="https://api.deepseek.com/v1">
      </div>
      <div class="field">
        <label id="lblApiKey"></label>
        <input type="password" id="aiApiKey" placeholder="sk-...">
      </div>
      <div class="field">
        <label id="lblModel"></label>
        <input type="text" id="aiModel" placeholder="deepseek-chat">
      </div>
      <div class="field">
        <label id="lblTargetLanguage"></label>
        <select id="translateTarget">
          <option value="Simplified Chinese" id="optLangZhCn"></option>
          <option value="English" id="optLangEn"></option>
          <option value="Japanese" id="optLangJa"></option>
          <option value="Korean" id="optLangKo"></option>
          <option value="French" id="optLangFr"></option>
          <option value="German" id="optLangDe"></option>
          <option value="Spanish" id="optLangEs"></option>
        </select>
      </div>
      <div class="field checkbox">
        <label>
          <input type="checkbox" id="autoTranslate">
          <span id="lblAutoTranslate"></span>
        </label>
      </div>
    </section>

    <!-- Other Settings + UI Language -->
    <section>
      <h2 id="lblOtherSection"></h2>
      <div class="field checkbox">
        <label>
          <input type="checkbox" id="highlightEnabled" checked>
          <span id="lblHighlight"></span>
        </label>
      </div>
      <div class="field">
        <label id="lblUiLanguage"></label>
        <select id="uiLanguage">
          <option value="auto" id="optLangAuto"></option>
          <option value="en" id="optLangEnglish"></option>
          <option value="zh_CN" id="optLangChinese"></option>
        </select>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn"></button>
      <button id="testBtn"></button>
      <span id="saveStatus"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
